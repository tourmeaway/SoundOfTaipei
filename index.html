<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聲音台灣 — Sounds of Taiwan</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1410;
    --ink2: #3d3028;
    --paper: #f5f0e8;
    --paper2: #ede7d6;
    --paper3: #e2dac8;
    --gold: #c9a84c;
    --gold2: #a07830;
    --red: #c0392b;
    --groove: #2a1f14;
    --groove2: #3d2d1e;
    --label: #f5f0e8;
    --shadow: rgba(26,20,16,0.35);
  }

  html, body {
    height: 100%;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Cormorant Garamond', Georgia, serif;
    overflow-x: hidden;
  }

  body {
    min-height: 100vh;
    background:
      radial-gradient(ellipse at 20% 80%, rgba(201,168,76,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(192,57,43,0.06) 0%, transparent 50%),
      var(--paper);
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
    opacity: 0.6;
  }

  .page {
    max-width: 960px;
    margin: 0 auto;
    padding: 60px 40px 100px;
    position: relative;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 70px;
  }

  .header-eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--gold2);
    text-transform: uppercase;
    margin-bottom: 16px;
    opacity: 0.8;
  }

  .header-title {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(2.4rem, 5vw, 4rem);
    font-weight: 300;
    letter-spacing: 0.08em;
    color: var(--ink);
    line-height: 1.15;
    margin-bottom: 8px;
  }

  .header-subtitle {
    font-style: italic;
    font-size: 1.25rem;
    font-weight: 300;
    color: var(--ink2);
    letter-spacing: 0.04em;
    margin-top: 12px;
    margin-bottom: 20px;
  }

  .header-line {
    width: 60px;
    height: 1px;
    background: var(--gold);
    margin: 24px auto 0;
    opacity: 0.6;
  }

  /* Player stage */
  .stage {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 60px;
    align-items: start;
    margin-bottom: 70px;
  }

  @media (max-width: 700px) {
    .stage { grid-template-columns: 1fr; gap: 40px; }
    .page { padding: 40px 24px 80px; }
  }

  /* Record player */
  .player-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }

  .turntable-base {
    width: 300px;
    height: 300px;
    position: relative;
    filter: drop-shadow(0 20px 40px var(--shadow));
  }

  /* Turntable plinth */
  .turntable-base svg {
    width: 100%;
    height: 100%;
  }

  /* Record */
  .record-container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 220px;
    height: 220px;
  }

  .record-svg {
    width: 100%;
    height: 100%;
    transform-origin: center;
    transition: opacity 0.8s ease;
  }

  .record-svg.spinning {
    animation: spin 3s linear infinite;
  }

  .record-svg.slowing {
    animation: spin 3s linear infinite;
    animation-play-state: paused;
    transition: animation 1s;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* Tonearm */
  .tonearm {
    position: absolute;
    top: 18px;
    right: 18px;
    width: 90px;
    height: 90px;
    transform-origin: 80px 10px;
    transition: transform 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .tonearm.on-record {
    transform: rotate(-28deg);
  }

  /* Info panel */
  .info-panel {
    padding-top: 20px;
  }

  .now-playing-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--gold2);
    margin-bottom: 16px;
    opacity: 0.7;
  }

  .track-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 1.8rem;
    font-weight: 300;
    color: var(--ink);
    line-height: 1.3;
    margin-bottom: 10px;
    min-height: 2.4em;
    transition: opacity 0.6s ease;
  }

  .track-subtitle {
    font-size: 1rem;
    font-style: italic;
    color: var(--ink2);
    opacity: 0.75;
    margin-bottom: 28px;
    min-height: 1.5em;
    transition: opacity 0.6s ease;
  }

  .divider {
    width: 40px;
    height: 1px;
    background: var(--gold);
    margin-bottom: 24px;
    opacity: 0.5;
  }

  .poem-block {
    font-size: 1.05rem;
    line-height: 1.9;
    color: var(--ink2);
    font-style: italic;
    font-weight: 300;
    min-height: 6em;
    transition: opacity 0.8s ease;
    border-left: 1px solid var(--gold);
    padding-left: 20px;
    opacity: 0;
  }

  .poem-block.visible {
    opacity: 1;
  }

  .poem-block.fading {
    opacity: 0;
  }

  /* Controls */
  .controls {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-top: 32px;
  }

  .play-btn {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: 1px solid var(--gold);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    color: var(--gold2);
    position: relative;
    overflow: hidden;
  }

  .play-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: var(--gold);
    opacity: 0;
    transform: scale(0.8);
    transition: all 0.3s ease;
  }

  .play-btn:hover::before { opacity: 0.12; transform: scale(1); }
  .play-btn:active { transform: scale(0.95); }

  .play-btn svg {
    position: relative;
    z-index: 1;
    transition: all 0.3s ease;
  }

  .volume-hint {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink2);
    opacity: 0.45;
  }

  /* Record selection */
  .selection-title {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--gold2);
    margin-bottom: 30px;
    opacity: 0.7;
    text-align: center;
  }

  .records-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
  }

  .record-card {
    position: relative;
    cursor: pointer;
    border: 1px solid transparent;
    border-radius: 4px;
    padding: 20px 18px;
    transition: all 0.4s ease;
    background: transparent;
    overflow: hidden;
  }

  .record-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--paper2);
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  .record-card:hover::before { opacity: 1; }

  .record-card.active {
    border-color: rgba(201,168,76,0.4);
  }

  .record-card.active::before {
    opacity: 1;
    background: var(--paper3);
  }

  .record-card-inner {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: flex-start;
    gap: 16px;
  }

  .mini-record {
    width: 46px;
    height: 46px;
    flex-shrink: 0;
    transition: transform 0.4s ease;
  }

  .record-card:hover .mini-record,
  .record-card.active .mini-record {
    transform: rotate(20deg);
  }

  .record-card-text {
    flex: 1;
  }

  .record-card-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 0.95rem;
    font-weight: 400;
    color: var(--ink);
    line-height: 1.3;
    margin-bottom: 4px;
  }

  .record-card-en {
    font-size: 0.78rem;
    font-style: italic;
    color: var(--ink2);
    opacity: 1;
    font-weight: bold;
    line-height: 1.3;
  }

  .record-card-num {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--gold2);
    opacity: 0.5;
    margin-bottom: 6px;
  }

  /* Active dot */
  .active-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--gold);
    position: absolute;
    top: 10px;
    right: 10px;
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  .record-card.active .active-dot {
    opacity: 1;
  }

  /* YouTube hidden iframe */
  #yt-container {
    position: fixed;
    width: 1px;
    height: 1px;
    opacity: 0;
    pointer-events: none;
    bottom: 0;
    left: 0;
  }

  /* Footer note */
  .footer-note {
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 8.5px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--ink2);
    opacity: 0.3;
    margin-top: 60px;
  }

  /* Waveform animation */
  .waveform {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 20px;
    opacity: 0;
    transition: opacity 0.6s ease;
  }

  .waveform.active { opacity: 1; }

  .wave-bar {
    width: 2px;
    background: var(--gold);
    border-radius: 1px;
    animation: wave 0.8s ease-in-out infinite alternate;
    opacity: 0.6;
  }

  .wave-bar:nth-child(1) { height: 6px; animation-delay: 0s; }
  .wave-bar:nth-child(2) { height: 14px; animation-delay: 0.1s; }
  .wave-bar:nth-child(3) { height: 10px; animation-delay: 0.2s; }
  .wave-bar:nth-child(4) { height: 18px; animation-delay: 0.05s; }
  .wave-bar:nth-child(5) { height: 8px; animation-delay: 0.15s; }
  .wave-bar:nth-child(6) { height: 14px; animation-delay: 0.25s; }
  .wave-bar:nth-child(7) { height: 6px; animation-delay: 0.08s; }

  @keyframes wave {
    from { transform: scaleY(0.4); }
    to { transform: scaleY(1); }
  }

  /* Fade in for page load */
  .fade-in {
    opacity: 0;
    transform: translateY(12px);
    animation: fadeUp 1s ease forwards;
  }

  .fade-in:nth-child(1) { animation-delay: 0.1s; }
  .fade-in:nth-child(2) { animation-delay: 0.3s; }
  .fade-in:nth-child(3) { animation-delay: 0.5s; }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

</style>
</head>
<body>

<div class="page">

  <header class="header fade-in">
    <div class="header-eyebrow">A Collection of Living Sounds</div>
    <h1 class="header-title">聲音台灣</h1>
    <p class="header-subtitle">Sounds of Taiwan</p>
    <div class="header-line"></div>
  </header>

  <div class="stage fade-in">

    <!-- Left: Turntable -->
    <div class="player-wrap">
      <div class="turntable-base" id="turntable-base">
        <!-- Wooden plinth -->
        <svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="plinthGrad" cx="50%" cy="40%" r="55%">
              <stop offset="0%" stop-color="#4a3420"/>
              <stop offset="100%" stop-color="#1e130a"/>
            </radialGradient>
            <radialGradient id="matGrad" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#2e2218"/>
              <stop offset="100%" stop-color="#1a1008"/>
            </radialGradient>
            <radialGradient id="recordGrad" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#2a2a2a"/>
              <stop offset="30%" stop-color="#111"/>
              <stop offset="100%" stop-color="#0a0a0a"/>
            </radialGradient>
          </defs>
          <!-- Plinth shadow -->
          <ellipse cx="150" cy="292" rx="130" ry="8" fill="rgba(0,0,0,0.25)"/>
          <!-- Plinth body -->
          <rect x="12" y="35" width="276" height="250" rx="8" fill="url(#plinthGrad)"/>
          <!-- Wood grain lines -->
          <line x1="12" y1="80" x2="288" y2="80" stroke="#3d2a18" stroke-width="0.5" opacity="0.5"/>
          <line x1="12" y1="130" x2="288" y2="130" stroke="#3d2a18" stroke-width="0.5" opacity="0.3"/>
          <line x1="12" y1="180" x2="288" y2="180" stroke="#3d2a18" stroke-width="0.5" opacity="0.5"/>
          <line x1="12" y1="230" x2="288" y2="230" stroke="#3d2a18" stroke-width="0.5" opacity="0.3"/>
          <!-- Plinth edge highlight -->
          <rect x="12" y="35" width="276" height="250" rx="8" fill="none" stroke="#5a3e27" stroke-width="1" opacity="0.6"/>
          <!-- Turntable mat -->
          <circle cx="150" cy="160" r="120" fill="url(#matGrad)"/>
          <circle cx="150" cy="160" r="120" fill="none" stroke="#2e2218" stroke-width="2" opacity="0.8"/>
          <!-- Spindle hole -->
          <circle cx="150" cy="160" r="4" fill="#111"/>
        </svg>

        <!-- Record (rotates) -->
        <div class="record-container">
          <svg class="record-svg" id="record-disc" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <radialGradient id="discGrad" cx="50%" cy="40%" r="60%">
                <stop offset="0%" stop-color="#2c2c2c"/>
                <stop offset="100%" stop-color="#0a0a0a"/>
              </radialGradient>
            </defs>
            <!-- Record body -->
            <circle cx="110" cy="110" r="108" fill="url(#discGrad)"/>
            <!-- Groove rings -->
            <circle cx="110" cy="110" r="104" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
            <circle cx="110" cy="110" r="100" fill="none" stroke="#222" stroke-width="0.5"/>
            <circle cx="110" cy="110" r="96" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
            <circle cx="110" cy="110" r="92" fill="none" stroke="#1e1e1e" stroke-width="0.5"/>
            <circle cx="110" cy="110" r="88" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
            <circle cx="110" cy="110" r="84" fill="none" stroke="#222" stroke-width="0.5"/>
            <circle cx="110" cy="110" r="80" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
            <circle cx="110" cy="110" r="76" fill="none" stroke="#1e1e1e" stroke-width="0.5"/>
            <circle cx="110" cy="110" r="72" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
            <circle cx="110" cy="110" r="68" fill="none" stroke="#222" stroke-width="0.5"/>
            <circle cx="110" cy="110" r="64" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
            <circle cx="110" cy="110" r="60" fill="none" stroke="#1e1e1e" stroke-width="0.5"/>
            <circle cx="110" cy="110" r="56" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
            <!-- Label area -->
            <circle cx="110" cy="110" r="50" id="record-label" fill="#c8a14a"/>
            <!-- Label decoration - default -->
            <circle cx="110" cy="110" r="48" fill="none" stroke="#a07830" stroke-width="0.5"/>
            <circle cx="110" cy="110" r="38" fill="none" stroke="#a07830" stroke-width="0.5" opacity="0.5"/>
            <!-- Label text group -->
            <g id="label-text">
              <text x="110" y="105" text-anchor="middle" font-family="'Noto Serif TC', serif" font-size="8" fill="#4a2e08" font-weight="600">聲音</text>
              <text x="110" y="117" text-anchor="middle" font-family="Georgia, serif" font-size="5.5" fill="#6b3e10" font-style="italic">Taiwan</text>
            </g>
            <!-- Spindle -->
            <circle cx="110" cy="110" r="5" fill="#888"/>
            <circle cx="110" cy="110" r="3" fill="#aaa"/>
            <circle cx="110" cy="110" r="1.5" fill="#666"/>
          </svg>
        </div>

        <!-- Tonearm -->
        <div class="tonearm" id="tonearm">
          <svg viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;">
            <!-- Pivot base -->
            <circle cx="80" cy="10" r="8" fill="#3a2f24" stroke="#5a4a38" stroke-width="0.5"/>
            <circle cx="80" cy="10" r="4" fill="#888"/>
            <circle cx="80" cy="10" r="2" fill="#aaa"/>
            <!-- Arm body (curved) -->
            <path d="M80 18 Q60 35 40 65 L30 80" stroke="#8a7560" stroke-width="4" fill="none" stroke-linecap="round"/>
            <path d="M80 18 Q60 35 40 65 L30 80" stroke="#c4a97a" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
            <!-- Headshell -->
            <rect x="22" y="76" width="14" height="8" rx="2" fill="#6b5840" stroke="#8a7560" stroke-width="0.5"/>
            <!-- Stylus -->
            <line x1="29" y1="84" x2="29" y2="90" stroke="#aaa" stroke-width="1"/>
            <circle cx="29" cy="90" r="1.5" fill="#ccc"/>
          </svg>
        </div>
      </div>

      <!-- Controls -->
      <div class="controls">
        <button class="play-btn" id="play-btn" onclick="togglePlay()" aria-label="Play / Pause">
          <svg id="play-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M8 5v14l11-7z"/>
          </svg>
        </button>
        <div class="waveform" id="waveform">
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
        </div>
        <span class="volume-hint" id="status-text">Select a disc below</span>
      </div>
    </div>

    <!-- Right: Info + poem -->
    <div class="info-panel fade-in">
      <div class="now-playing-label">Now Playing</div>
      <h2 class="track-title" id="track-title">—</h2>
      <p class="track-subtitle" id="track-subtitle">Choose a disc to begin</p>
      <div class="divider"></div>
      <div class="poem-block" id="poem-block"></div>
    </div>

  </div>

  <!-- Record selection -->
  <div class="fade-in">
    <div class="selection-title">— Select a Disc —</div>
    <div class="records-grid" id="records-grid">
      <!-- Cards injected by JS -->
    </div>
  </div>

  <p class="footer-note">Recorded in Taiwan · A meditation on everyday sound</p>
</div>

<!-- Hidden YouTube player -->
<div id="yt-container">
  <div id="yt-player"></div>
</div>

<script>
const tracks = [
  {
    id: '1r6DABN9Gag',
    titleZh: '傳統市場',
    titleEn: 'Traditional Market',
    subtitle: 'The song of commerce & community',
    color: '#c8531e',
    labelBg: '#c8531e',
    labelText: '#f5dbc8',
    poem: `Voices layer over voices—\nthe price of dragon fruit,\na grandmother's laughter.\nEverything alive,\neverything for sale,\nnothing truly leaving.`,
    num: 'Side A — 01'
  },
  {
    id: 'R5B1jrnqoho',
    startSeconds: 260,
    titleZh: '台式早餐店',
    titleEn: 'Taiwanese Breakfast Store',
    subtitle: 'Morning rituals in oil and steam',
    color: '#c9a84c',
    labelBg: '#c9a84c',
    labelText: '#3a2208',
    poem: `Before the city wakes,\nthe griddle already sings.\nEgg on egg, dream on dream—\nscallion pancakes folding time\ninto the soft beginning\nof another day.`,
    num: 'Side A — 02'
  },
  {
    id: 'Xt95Wn0FiEo',
    titleZh: '垃圾車',
    titleEn: 'Garbage Truck Melody',
    subtitle: 'Für Elise drifting down the lane',
    color: '#2e6e8e',
    labelBg: '#2e6e8e',
    labelText: '#d0eaf7',
    poem: `Every evening, Beethoven\nrounds the corner.\nDoors open all at once,\nneighbors emerge like flowers—\nthe most tender appointment\nnobody misses.`,
    num: 'Side B — 01'
  },
  {
    id: 'NNO2r8_0zns',
    titleZh: '廟宇祭典',
    titleEn: 'Temple Ceremony',
    subtitle: 'Smoke and drumbeats, heaven & earth',
    color: '#7b2d2d',
    labelBg: '#7b2d2d',
    labelText: '#f5ddd8',
    poem: `The drum speaks first—\nthen the gods arrive.\nIncense threads upward\nthrough centuries of asking.\nWe are small. We are\nvery briefly here.`,
    num: 'Side B — 02'
  }
];

let currentTrack = null;
let isPlaying = false;
let player = null;
let playerReady = false;

// Build record cards
const grid = document.getElementById('records-grid');
tracks.forEach((t, i) => {
  const card = document.createElement('div');
  card.className = 'record-card';
  card.id = 'card-' + i;
  card.onclick = () => selectTrack(i);
  card.innerHTML = `
    <div class="active-dot"></div>
    <div class="record-card-inner">
      <svg class="mini-record" viewBox="0 0 46 46" xmlns="http://www.w3.org/2000/svg">
        <circle cx="23" cy="23" r="22" fill="#111"/>
        <circle cx="23" cy="23" r="18" fill="none" stroke="#222" stroke-width="1"/>
        <circle cx="23" cy="23" r="14" fill="none" stroke="#1a1a1a" stroke-width="1"/>
        <circle cx="23" cy="23" r="10" fill="${t.labelBg}"/>
        <circle cx="23" cy="23" r="3" fill="#888"/>
        <circle cx="23" cy="23" r="1.5" fill="#ccc"/>
      </svg>
      <div class="record-card-text">
        <div class="record-card-num">${t.num}</div>
        <div class="record-card-title">${t.titleZh}</div>
        <div class="record-card-en">${t.titleEn}</div>
      </div>
    </div>
  `;
  grid.appendChild(card);
});

function selectTrack(idx) {
  const t = tracks[idx];
  const wasPlaying = isPlaying;

  // Stop current
  if (isPlaying) stopPlayback(false);

  // Update active card
  document.querySelectorAll('.record-card').forEach((c, i) => {
    c.classList.toggle('active', i === idx);
  });

  currentTrack = idx;

  // Update record label color
  const label = document.getElementById('record-label');
  label.setAttribute('fill', t.labelBg);
  const labelText = document.getElementById('label-text');
  labelText.innerHTML = `
    <text x="110" y="105" text-anchor="middle" font-family="'Noto Serif TC', serif" font-size="8" fill="${t.labelText}" font-weight="600">聲音</text>
    <text x="110" y="117" text-anchor="middle" font-family="Georgia, serif" font-size="5.5" fill="${t.labelText}" font-style="italic" opacity="0.8">Taiwan</text>
  `;

  // Update info panel
  fadeInfoUpdate(t);

  // Auto-play
  startPlayback(idx);
}

function fadeInfoUpdate(t) {
  const titleEl = document.getElementById('track-title');
  const subEl = document.getElementById('track-subtitle');
  const poemEl = document.getElementById('poem-block');

  poemEl.classList.remove('visible');
  poemEl.classList.add('fading');

  setTimeout(() => {
    titleEl.textContent = t.titleZh + ' · ' + t.titleEn;
    subEl.textContent = t.subtitle;
    poemEl.innerHTML = t.poem.replace(/\n/g, '<br>');
    poemEl.classList.remove('fading');

    setTimeout(() => {
      poemEl.classList.add('visible');
    }, 100);
  }, 400);
}

function startPlayback(idx) {
  const t = tracks[idx];
  isPlaying = true;

  // Arm moves in
  document.getElementById('tonearm').classList.add('on-record');
  document.getElementById('record-disc').classList.add('spinning');
  document.getElementById('waveform').classList.add('active');
  document.getElementById('status-text').textContent = 'Playing…';

  // Update button to pause icon
  document.getElementById('play-icon').innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';

  // Play YouTube
  if (playerReady && player) {
    player.loadVideoById({ videoId: t.id, startSeconds: t.startSeconds || 0 });
    player.playVideo();
  } else {
    // Queue for when ready
    window._pendingPlay = t.id;
  }
}

function stopPlayback(resetArm = true) {
  isPlaying = false;
  const disc = document.getElementById('record-disc');
  disc.classList.remove('spinning');
  document.getElementById('waveform').classList.remove('active');
  document.getElementById('status-text').textContent = currentTrack !== null ? 'Paused' : 'Select a disc';
  document.getElementById('play-icon').innerHTML = '<path d="M8 5v14l11-7z"/>';

  if (resetArm) {
    document.getElementById('tonearm').classList.remove('on-record');
  }

  if (playerReady && player) {
    player.pauseVideo();
  }
}

function togglePlay() {
  if (currentTrack === null) return;
  if (isPlaying) {
    stopPlayback(false);
  } else {
    startPlayback(currentTrack);
  }
}

// YouTube IFrame API
window.onYouTubeIframeAPIReady = function() {
  player = new YT.Player('yt-player', {
    height: '1',
    width: '1',
    videoId: '',
    playerVars: { autoplay: 0, controls: 0, rel: 0 },
    events: {
      onReady: function(e) {
        playerReady = true;
        if (window._pendingPlay) {
          e.target.loadVideoById(window._pendingPlay);
          e.target.playVideo();
          window._pendingPlay = null;
        }
      },
      onStateChange: function(e) {
        if (e.data === YT.PlayerState.ENDED) {
          stopPlayback(true);
        }
      }
    }
  });
};

const tag = document.createElement('script');
tag.src = 'https://www.youtube.com/iframe_api';
document.head.appendChild(tag);
</script>

</body>
</html>
